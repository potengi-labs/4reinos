<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aventura dos 4 Reinos</title>
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/world.css">
<link rel="stylesheet" href="assets/css/map.css">
<link rel="stylesheet" href="assets/css/mission.css">
<link rel="stylesheet" href="assets/css/footer.css">
</head>

<style>
    .popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup-content{
  background:#0b1625;
  padding:20px;
  border-radius:12px;
  width:300px;
  color:#fff;
  position:relative;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.close-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:none;
  border:none;
  font-size:18px;
  color:#fff;
  cursor:pointer;
}

.hidden{
  display:none;
}
</style>
    
<body>

<div class="world">
    <!-- CENÁRIO DO JOGO -->
    <div id="world-layer"></div>
    <!-- EFEITOS -->
    <div class="fog"></div>
    <div class="particles" id="particles"></div>
</div>

<!-- INTERFACE FIXA -->
<footer class="ui-layer"></footer>

<script src="assets/js/component-loader.js"></script>
<script src="assets/js/scene-manager.js"></script>
<script src="assets/js/map-points.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/missions.js"></script>
<script src="assets/js/particles.js"></script>
<!--<script src="assets/js/data/reinos.js"></script>
<script src="assets/js/player.js"></script>-->

<!-- POPUP BACKDROP -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <button class="close-btn" onclick="closePopup()">✖</button>
        <h2 id="popup-title">Título</h2>
    <div id="popup-body">
      Conteúdo aqui...
    </div>
  </div>
</div>
<!-- POPUP BACKDROP -->
    <script>
function openPopup(title, content){
  document.getElementById("popup-title").innerText = title;
  document.getElementById("popup-body").innerHTML = content;
  document.getElementById("popup").classList.remove("hidden");
}

function closePopup(){
  document.getElementById("popup").classList.add("hidden");
}
</script>

    
</body>
</html>
