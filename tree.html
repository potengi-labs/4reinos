<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <meta name="google-adsense-account" content="ca-pub-3277175946272866">

<title>Repository Tree Viewer</title>

<style>

body{
    margin:0;
    background:#0d1117;
    font-family:Inter,sans-serif;
    color:white;
}

.header{
    padding:20px 30px;
    background:#161b22;
    border-bottom:1px solid #30363d;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:20px;
    font-weight:700;
}

.controls{
    display:flex;
    gap:10px;
}

button{
    background:#238636;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    opacity:.9;
}

.wrapper{
    height:calc(100vh - 81px);
    transition:.3s;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:white;
}

.collapsed{
    height:0 !important;
    overflow:hidden;
}

</style>


<!-- ============================================================ GOOGLE ADSENSE ============================================================= -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3277175946272866" crossorigin="anonymous"></script>

    
</head>

<body>

<div class="header">

    <div class="title">
        📁 potengi-labs/4reinos
    </div>

    <div class="controls">

        <button onclick="toggleTree()">
            Mostrar/Ocultar
        </button>

        <button onclick="fullscreenTree()">
            Fullscreen
        </button>

    </div>

</div>

<div class="wrapper" id="treeWrapper">

<iframe
src="https://githubtree.mgks.dev/repo/potengi-labs/4reinos">
</iframe>

</div>

<script>

function toggleTree(){

    document
    .getElementById("treeWrapper")
    .classList
    .toggle("collapsed");

}

function fullscreenTree(){

    const elem =
    document.getElementById("treeWrapper");

    if(elem.requestFullscreen){

        elem.requestFullscreen();

    }

}

</script>

</body>
</html>
